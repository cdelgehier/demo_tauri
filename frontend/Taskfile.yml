version: '3'

tasks:
  install:
    desc: Install npm dependencies
    cmds:
      - npm install
    sources:
      - package.json
    generates:
      - node_modules/.package-lock.json

  test:
    desc: Run Vitest tests
    deps: [install]
    cmds:
      - npm run test

  lint:
    desc: Check TypeScript types (nuxi typecheck)
    deps: [install]
    cmds:
      - npx nuxi typecheck

  up:
    desc: Start the Nuxt dev server (port 3000)
    deps: [install]
    cmds:
      - npm run dev

  generate:
    desc: Build the frontend as static files (.output/public/)
    deps: [install]
    cmds:
      - npm run generate
