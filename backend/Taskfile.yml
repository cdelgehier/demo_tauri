version: '3'

tasks:
  install:
    desc: Installe les dépendances Python avec uv
    cmds:
      - uv sync --group dev
    sources:
      - pyproject.toml
    generates:
      - .venv/pyvenv.cfg

  test:
    desc: Lance les tests pytest
    deps: [install]
    cmds:
      - uv run pytest

  lint:
    desc: Vérifie le code avec ruff (lint + format check)
    deps: [install]
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  format:
    desc: Formate le code avec ruff
    deps: [install]
    cmds:
      - uv run ruff format .

  up:
    desc: Démarre le serveur FastAPI en dev (port 8000, hot-reload)
    deps: [install]
    cmds:
      - uv run uvicorn main:app --reload --port 8000

  build-bin:
    desc: Compile le binaire PyInstaller et le place dans src-tauri/binaries/
    deps: [install]
    vars:
      TARGET:
        sh: rustc -Vv | grep host | cut -d' ' -f2
    cmds:
      - uv run pyinstaller
        --onefile
        --name fastapi-server
        --hidden-import uvicorn.logging
        --hidden-import uvicorn.loops
        --hidden-import uvicorn.loops.auto
        --hidden-import uvicorn.protocols
        --hidden-import uvicorn.protocols.http
        --hidden-import uvicorn.protocols.http.auto
        --hidden-import uvicorn.lifespan
        --hidden-import uvicorn.lifespan.on
        --hidden-import main
        --add-data "main.py:."
        server.py
      - mkdir -p ../src-tauri/binaries
      - cp dist/fastapi-server ../src-tauri/binaries/fastapi-server-{{.TARGET}}
