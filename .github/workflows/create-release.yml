---
name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          CHANGELOG_SECTION=$(awk -v tag="$TAG" '
            /^## v/ {
              if (found) exit
              if ($2 == tag) found=1
              next
            }
            found {print}
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION=$(cat CHANGELOG.md)
          fi

          echo "$CHANGELOG_SECTION" > release_notes.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ GitHub Release created for version ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 Release URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

  build-macos:
    name: Build macOS package (${{ matrix.arch }})
    needs: create-release

    strategy:
      matrix:
        include:
          - runs-on: macos-latest  # Apple Silicon (ARM)
            arch: aarch64
          - runs-on: macos-13      # Intel (x86_64)
            arch: x86_64

    runs-on: ${{ matrix.runs-on }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: task package

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ macOS ${{ matrix.arch }} package built and uploaded" >> $GITHUB_STEP_SUMMARY
          ls -lh src-tauri/target/release/bundle/dmg/*.dmg >> $GITHUB_STEP_SUMMARY
