version: '3'

includes:
  frontend:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend
  backend:
    taskfile: ./src-tauri/Taskfile.yml
    dir: ./src-tauri

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  install:
    desc: Install all dependencies (frontend + root)
    deps: [frontend:install]
    cmds:
      - npm install

  test:
    desc: Run all tests (frontend + backend in parallel)
    deps: [frontend:test, backend:test]

  lint:
    desc: Check all code (frontend + backend in parallel)
    deps: [frontend:lint, backend:lint]

  up:
    aliases: [dev]
    desc: Start the app in dev mode (Nuxt hot-reload + embedded Rocket backend)
    cmds:
      - npx tauri dev

  stop:
    aliases: [down]
    desc: Stop all dev processes (frontend :3000, Tauri, backend :8000)
    cmds:
      - lsof -ti:3000 | xargs kill -9 2>/dev/null || true
      - lsof -ti:8000 | xargs kill -9 2>/dev/null || true
      - pkill -f "tauri dev" 2>/dev/null || true

  clean:
    desc: Remove all build artifacts (.nuxt, target, node_modules, Task checksums)
    cmds:
      # Nuxt
      - rm -rf frontend/.nuxt frontend/.output frontend/node_modules frontend/.task
      # Tauri / backend
      - rm -rf src-tauri/target
      # Root node modules
      - rm -rf node_modules
      # Task checksums (forces fingerprints to be recalculated)
      - rm -rf .task

  icons:
    desc: Regenerate all icon formats from src-tauri/icons/app-icon.png
    cmds:
      - npx tauri icon src-tauri/icons/app-icon.png

  package:
    desc: Build the full macOS app (.app + .dmg)
    cmds:
      - npm install
      - task: icons
      - task: frontend:install
      - npx tauri build
