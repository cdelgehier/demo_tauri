version: '3'

includes:
  frontend:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend

tasks:
  default:
    desc: Liste toutes les tâches disponibles
    silent: true
    cmds:
      - task --list

  install:
    desc: Installe toutes les dépendances (frontend + backend + racine)
    deps: [frontend:install, backend:install]
    cmds:
      - npm install

  test:
    desc: Lance tous les tests (frontend + backend en parallèle)
    deps: [frontend:test, backend:test]

  lint:
    desc: Lint tout le code (frontend + backend en parallèle)
    deps: [frontend:lint, backend:lint]

  up:
    desc: Démarre le frontend (port 3000) et le backend (port 8000) en parallèle
    deps:
      - task: frontend:up
      - task: backend:up

  dev:
    desc: Lance l'app Tauri en mode dev (hot-reload Nuxt + sidecar FastAPI)
    deps: [package:sidecar]
    cmds:
      - npx tauri dev

  stop:
    aliases: [down]
    desc: Arrête tous les serveurs de dev (frontend :3000, backend :8000, Tauri)
    cmds:
      - lsof -ti:3000 | xargs kill -9 2>/dev/null || true
      - lsof -ti:8000 | xargs kill -9 2>/dev/null || true
      - pkill -f "tauri dev" 2>/dev/null || true

  clean:
    desc: Supprime tous les artefacts de build (venv, .nuxt, target, node_modules, sidecar, checksums Task)
    cmds:
      # Python
      - rm -rf backend/.venv backend/dist backend/build backend/__pycache__ backend/*.spec
      # Nuxt
      - rm -rf frontend/.nuxt frontend/.output frontend/node_modules
      # Tauri
      - rm -rf src-tauri/target src-tauri/binaries
      # Node racine
      - rm -rf node_modules
      # Checksums Task (force le recalcul des fingerprints)
      - rm -rf .task

  icons:
    desc: Régénère tous les formats d'icônes depuis src-tauri/icons/app-icon.png
    cmds:
      - npx tauri icon src-tauri/icons/app-icon.png

  package:sidecar:
    desc: Compile le binaire FastAPI (PyInstaller) et le place dans src-tauri/binaries/
    vars:
      TARGET:
        sh: rustc -Vv | grep host | cut -d' ' -f2
    sources:
      - backend/main.py
      - backend/server.py
      - backend/pyproject.toml
    generates:
      - "src-tauri/binaries/fastapi-server-{{.TARGET}}"
    cmds:
      - task: backend:build-bin

  package:
    desc: Construit l'app macOS complète (.app + .dmg)
    cmds:
      - npm install
      - task: icons
      - task: backend:build-bin
      - task: frontend:install
      - npx tauri build
